name: ghsummon
on:
  push:
    branches:
      - main
    paths:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ghsummon:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Build and Run ghsummon
        run: |
          go build -o ghsummon ./cmd/ghsummon
          ./ghsummon
        env:
          GITHUB_TOKEN: ${{ secrets.GHSUMMON_TOKEN }}
