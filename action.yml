name: "ghsummon - Summon Copilot Coding Agent"
author: Songmu
description: Summon Copilot Coding Agent from inline @copilot directives
inputs:
  version:
    description: "A version to install ghsummon"
    required: false
    default: "v0.0.2"
  token:
    description: "GitHub token for API calls and git operations. A fine-grained PAT with contents:write and pull_requests:write is required for Copilot agent assignment."
    required: true
runs:
  using: "composite"
  steps:
  - name: ghsummon
    id: ghsummon
    run: |
      cd "${GITHUB_WORKSPACE}" || exit 1
      TEMP_PATH="$(mktemp -d)"
      PATH="${TEMP_PATH}:$PATH"
      curl -sfL "https://raw.githubusercontent.com/Songmu/ghsummon/${ACTION_REF}/install.sh" | sh -s -- -b "$TEMP_PATH" "$GHSUMMON_VERSION" 2>&1
      ghsummon
    shell: bash
    env:
      ACTION_REF: ${{ github.action_ref }}
      GHSUMMON_VERSION: ${{ inputs.version }}
      GITHUB_TOKEN: ${{ inputs.token }}
branding:
  icon: 'send'
  color: 'blue'
